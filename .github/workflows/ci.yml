name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `npm ci` installs from package-lock.json exactly — this would have
      # caught the original break where react-markdown/remark-gfm were
      # declared but never installed.
      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Data integrity check
        run: npm run check:data

      - name: Build
        run: npm run build
